storageLocation:
  type: azure-key-vault
  parameters:
    subscription: a4fc5514-21a9-4296-bfaf-5c7ee7fa35d1
    name: EngKeyVault

references:
  helixkv:
    type: azure-key-vault
    parameters:
      subscription: a4fc5514-21a9-4296-bfaf-5c7ee7fa35d1
      name: helixkv

secrets:
  BotAccount-dotnet-maestro-bot:
    type: github-account
    parameters:
      Name: dotnet-maestro-bot

  BotAccount-dotnet-bot:
    type: github-account
    parameters:
      Name: dotnet-bot

  BotAccount-dotnet-renovate-bot:
    type: github-account
    parameters:
      Name: dotnet-renovate-bot

  #Publish-Build-Assets
  BotAccount-dotnet-maestro-bot-PAT:
    type: github-access-token
    parameters:
      gitHubBotAccountSecret: BotAccount-dotnet-maestro-bot
      gitHubBotAccountName: dotnet-maestro-bot

  # Mirror-Credentials - used by dotnet-mirroring pipelines
  BotAccount-dotnet-maestro-bot-mirroring-PAT:
    type: github-access-token
    parameters:
      gitHubBotAccountSecret: BotAccount-dotnet-maestro-bot
      gitHubBotAccountName: dotnet-maestro-bot

  BotAccount-dotnet-bot-repo-PAT:
    type: github-access-token
    parameters:
      gitHubBotAccountSecret: BotAccount-dotnet-bot
      gitHubBotAccountName: dotnet-bot

  akams-client-id:
    type: text
    parameters:
      description: Client id for akams app

  #AzureDevOps-Artifact-Feeds-Pats
  dn-bot-all-orgs-artifact-feeds-rw:
    type: azure-devops-access-token
    parameters:
      domainAccountName: dn-bot
      domainAccountSecret:
          location: helixkv
          name: dn-bot-account-redmond
      name: dn-bot-all-orgs-artifact-feeds
      organizations: dnceng devdiv dotnet-security-partners
      scopes: packaging_write

  #OneLocBuildVariables
  dn-bot-ceapex-package-r:
    type: azure-devops-access-token
    parameters:
      domainAccountName: dn-bot
      domainAccountSecret:
          location: helixkv
          name: dn-bot-account-redmond
      name: dn-bot-ceapex-package-r
      organizations: ceapex
      scopes: packaging
