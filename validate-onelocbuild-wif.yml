trigger: none
pr: none

pool:
  name: NetCore1ESPool-Internal
  demands: ImageOverride -equals windows.vs2022.amd64

steps:
- task: AzureCLI@2
  displayName: 'Validate: Acquire Entra token for ceapex via WIF SC'
  inputs:
    azureSubscription: 'dnceng-onelocbuild-ceapex'
    scriptType: 'pscore'
    scriptLocation: 'inlineScript'
    inlineScript: |
      Write-Host "Step 1: Acquiring Entra token for AzDO resource..."
      $token = az account get-access-token --query accessToken --resource 499b84ac-1321-427f-aa17-267ca6975798 -o tsv
      if (-not $token) { Write-Error "FAILED: Could not acquire token"; exit 1 }
      Write-Host "SUCCESS: Got Entra token (length: $($token.Length))"

      Write-Host "`nStep 2: Testing ceapex feed access..."
      $feedHeaders = @{ Authorization = "Bearer $token" }
      try {
        $resp = Invoke-RestMethod -Uri "https://feeds.dev.azure.com/ceapex/_apis/packaging/feeds?api-version=7.0" -Headers $feedHeaders
        Write-Host "SUCCESS: Accessed ceapex feeds. Count: $($resp.count)"
        $resp.value | Select-Object -First 5 | ForEach-Object { Write-Host "  - $($_.name)" }
      } catch {
        Write-Error "FAILED: Could not access ceapex feeds: $($_.Exception.Message)"
        exit 1
      }
      Write-Host "`nAll validations passed!"
