parameters:
  buildArgs: ''
  validateBlobFeedUrl: https://dotnetfeed.blob.core.windows.net/dotnet-core-test/index.json
  buildConfig: Release
  microbuildUseESRP: false


jobs:
- template: /eng/common/templates-official/job/job.yml@self
  parameters:
    name: ValidateArcadeSDK
    displayName: Validate Arcade SDK
    enableMicrobuild: false
    microbuildUseESRP: ${{ parameters.microbuildUseESRP }}
    artifacts:
      download:
        path: build_stage_artifacts
      publish:
        artifacts:
          name: Artifacts_ValidateSdk_Windows_NT_Release
        logs:
          name: Logs_ValidateSdk_Windows_NT_Release
    timeoutInMinutes: 90
    variables:
    - group: Publish-Build-Assets
    - _BuildConfig: ${{ parameters.buildConfig }}
    - _BuildArgs: ${{ parameters.buildArgs }}
    - _ValidateBlobFeedUrl: ${{ parameters.validateBlobFeedUrl }}
    - template: /eng/common/templates-official/variables/pool-providers.yml@self
    pool:
      name: $(DncEngInternalBuildPool)
      demands: ImageOverride -equals windows.vs2026.amd64
    preSteps:
    - checkout: self
      clean: true
    steps:
    # Point the repo at the newly produced Arcade/Helix SDK (bump global.json + add the local feed)
    # so the build below actually validates the SDK this build produced, not the bootstrap SDK. This
    # is a pure file edit (no darc / no auth); darc update-dependencies is not used because arcade
    # does not track its own SDK in Version.Details.xml, so it would have nothing to update.
    - powershell: >
        .\eng\validation\use-built-sdk.ps1
        -PackagesSource $(System.DefaultWorkingDirectory)/build_stage_artifacts
      displayName: Use newly built SDK
    - script: eng\common\cibuild.cmd
        $(_BuildArgs)
      displayName: Build / Validate
