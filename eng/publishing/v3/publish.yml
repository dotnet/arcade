parameters:
  artifactsPublishingAdditionalParameters: ''
  PromoteToChannelIds: ''
  BARBuildId: ''
  symbolPublishingAdditionalParameters: ''
  buildQuality: 'daily'
stages:
- stage: publish
  displayName: Publishing
  jobs:
  - job: publish_assets
    displayName: Publish Assets and Symbols
    timeoutInMinutes: 120
    variables:
    - group: AzureDevOps-Artifact-Feeds-Pats
    - group: Publish-Build-Assets

    - template: /eng/common/templates-official/post-build/common-variables.yml@self

    steps:
    - task: AzureCLI@2
      displayName: Validate and Locate Build
      inputs:
        azureSubscription: "Darc: Maestro Production"
        scriptType: ps
        scriptLocation: scriptPath
        scriptPath: $(System.DefaultWorkingDirectory)/eng/publishing/v3/validate-and-locate-build.ps1
        arguments: >
          -BuildId ${{ parameters.BARBuildId }}
          -PromoteToChannelIds ${{ parameters.PromoteToChannelIds }}
          -DarcVersion $(DarcVersion)

    - task: DownloadPipelineArtifact@2
      displayName: Download V3 Merged Manifest
      continueOnError: true
      enabled: true
      inputs:
        buildType: specific
        buildVersionToDownload: specific
        project: $(AzDOProject)
        pipeline: $(AzDOPipelineId)
        buildId: $(AzDOBuildId)
        downloadType: 'specific'
        artifact: BlobArtifacts
        itemPattern: |
          **/MergedManifest.xml
        downloadPath: '$(Build.ArtifactStagingDirectory)/BlobArtifacts'

    - task: DownloadPipelineArtifact@2
      displayName: Download V3 PDB Artifacts
      continueOnError: true
      enabled: true
      inputs:
        buildType: specific
        buildVersionToDownload: specific
        project: $(AzDOProject)
        pipeline: $(AzDOPipelineId)
        buildId: $(AzDOBuildId)
        downloadType: 'specific'
        artifact: PdbArtifacts
        downloadPath: '$(Build.ArtifactStagingDirectory)/PdbArtifacts'

    - task: DownloadPipelineArtifact@2
      displayName: Download V4 Merged Manifest
      continueOnError: true
      enabled: true
      inputs:
        buildType: specific
        buildVersionToDownload: specific
        project: $(AzDOProject)
        pipeline: $(AzDOPipelineId)
        buildId: $(AzDOBuildId)
        downloadType: 'specific'
        artifact: AssetManifests
        itemPattern: |
          **/MergedManifest.xml
        downloadPath: '$(Build.ArtifactStagingDirectory)/BlobArtifacts'

    - task: DownloadPipelineArtifact@2
      displayName: Download Release Configs
      continueOnError: true
      enabled: true
      inputs:
        buildType: specific
        buildVersionToDownload: specific
        project: $(AzDOProject)
        pipeline: $(AzDOPipelineId)
        buildId: $(AzDOBuildId)
        downloadType: 'specific'
        artifact: ReleaseConfigs
        itemPattern: |
          **/SymbolPublishingExclusionsFile.txt
        downloadPath: '$(Build.ArtifactStagingDirectory)/ReleaseConfigs'

    - task: NuGetToolInstaller@1
      displayName: 'Install NuGet.exe'

    - task: NuGetAuthenticate@1
      displayName: 'Authenticate to AzDO Feeds'

    - task: AzureCLI@2
      displayName: Get AzDO feed publish token
      name: GetFeedToken
      inputs:
        azureSubscription: dnceng-artifact-feeds-publish
        addSpnToEnvironment: true
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          # Diagnostic (non-secret): log which identity/tenant is federating so that a missing
          # service connection or a misconfigured federated identity credential (FIC) on the
          # backing app registration is immediately visible in the build logs.
          Write-Host "Acquiring AzDO feed publish token via service connection 'dnceng-artifact-feeds-publish'."
          Write-Host "  Service principal (client) id: $($env:servicePrincipalId)"
          Write-Host "  Tenant id: $($env:tenantId)"
          $feedToken = az account get-access-token --resource "499b84ac-1321-427f-aa17-267ca6975798" --query accessToken -o tsv
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($feedToken)) {
            Write-Error ("Failed to acquire an AzDO feed publish token from the 'dnceng-artifact-feeds-publish' service connection (az exit code $LASTEXITCODE). " +
              "This usually means the service connection does not exist in this organization, or its federated identity credential is not configured on the " +
              "backing app registration for this org. The Build Promotion Pipeline runs in both dnceng and devdiv, so the service connection (and a matching FIC) " +
              "must exist in each org. See https://aka.ms/yamlauthz.")
            exit 1
          }
          # Assert the acquired token is a well-formed JWT (three dot-separated segments).
          # AzureDevOpsNugetFeedAssetPublisher selects Bearer vs Basic auth by exactly this check
          # (_accessToken.Split('.').Length == 3); a non-JWT here would silently fall back to Basic
          # (PAT) auth downstream and fail to publish, so fail fast with a clear message instead.
          if ($feedToken.Split('.').Length -ne 3) {
            Write-Error ("The token returned by the 'dnceng-artifact-feeds-publish' service connection is not a JWT (expected three '.'-separated segments). " +
              "Downstream publishing (AzureDevOpsNugetFeedAssetPublisher) would incorrectly treat it as a PAT and fail. " +
              "Verify the service connection is an Entra/WIF (azurerm) connection, not a PAT-based one.")
            exit 1
          }
          Write-Host "Successfully acquired AzDO feed publish token (validated as JWT)."
          Write-Host "##vso[task.setvariable variable=AzDoFeedToken;isOutput=true;issecret=true]$feedToken"

    - task: AzureCLI@2
      displayName: Get aka.ms client certificate
      inputs:
        azureSubscription: 'DotNet-Engineering-Services_KeyVault'
        scriptType: pscore
        scriptLocation: inlineScript
        inlineScript: |
          az keyvault secret show --vault-name EngKeyVault --name Redirection-UST-Client-NetCoreDeployment | ConvertFrom-Json | Select-Object -Expand  value > $(Agent.TempDirectory)/akamsclientcert.pfx

    - task: AzureCLI@2
      displayName: Authenticate Maestro API
      name: AuthenticateMaestro
      inputs:
        azureSubscription: 'Darc: Maestro Production'
        addSpnToEnvironment: true
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          # MaestroAppClientId provided by Publish-Build-Assets
          $token = (az account get-access-token --resource "$(MaestroAppClientId)" | ConvertFrom-Json).accessToken
          
          echo "##vso[task.setvariable variable=MaestroToken;isOutput=true;isSecret=true]$token"

    - task: AzureCLI@2
      displayName: Publish packages, blobs and symbols
      env:
        SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      inputs:
        azureSubscription: maestro-build-promotion
        addSpnToEnvironment: true
        scriptType: ps
        scriptLocation: scriptPath
        scriptPath: $(System.DefaultWorkingDirectory)/eng/common/sdk-task.ps1
        arguments: >
          -task PublishArtifactsInManifest -restore -msbuildEngine dotnet -noWarnAsError
          /p:PublishingInfraVersion=3
          /p:BARBuildId=${{ parameters.BARBuildId }}
          /p:TargetChannels='${{ parameters.PromoteToChannelIds }}'
          /p:IsInternalBuild=${{ contains(variables['AzDOBranch'], 'internal/') }}
          /p:NugetPath=$(NuGetExeToolPath)
          /p:MaestroApiEndpoint='$(MaestroApiEndPoint)'
          /p:BuildAssetRegistryToken='$(AuthenticateMaestro.MaestroToken)'
          /p:ManifestsBasePath='$(Build.ArtifactStagingDirectory)/AssetManifests/'
          /p:BlobBasePath='$(Build.ArtifactStagingDirectory)/BlobArtifacts/'
          /p:PackageBasePath='$(Build.ArtifactStagingDirectory)/PackageArtifacts/'
          /p:PublishInstallersAndChecksums=true
          /p:AzureDevOpsFeedsKey='$(GetFeedToken.AzDoFeedToken)'
          /p:AkaMSClientId=$(akams-app-id)
          /p:AkaMSClientCertificate=$(Agent.TempDirectory)/akamsclientcert.pfx
          ${{ parameters.artifactsPublishingAdditionalParameters }} 
          /p:PDBArtifactsBasePath='$(Build.ArtifactStagingDirectory)/PDBArtifacts/'
          /p:SymbolPublishingExclusionsFile='$(Build.ArtifactStagingDirectory)/ReleaseConfigs/SymbolPublishingExclusionsFile.txt'
          /p:TempSymbolsAzureDevOpsOrg='dnceng'
          /p:SymbolRequestProject='dotnet'
          ${{ parameters.symbolPublishingAdditionalParameters}}
          /p:BuildQuality='${{ parameters.buildQuality }}'
          /p:ArtifactsBasePath='$(Build.ArtifactStagingDirectory)/'
          /p:BuildId='$(AzDOBuildId)'
          /p:AzureDevOpsOrg='$(AzDOAccount)'
          /p:AzureProject='$(AzDOProject)'
          /p:UseStreamingPublishing='true'
          /p:StreamingPublishingMaxClients=16
          /p:NonStreamingPublishingMaxClients=12

    - template: /eng/common/templates-official/steps/publish-logs.yml@self
      parameters:
        StageLabel: '${{ parameters.stageName }}'
        JobLabel: 'AssetsPublishing'
        BinlogToolVersion: $(BinlogToolVersion)
        CustomSensitiveDataList: '$(AuthenticateMaestro.MaestroToken)'
