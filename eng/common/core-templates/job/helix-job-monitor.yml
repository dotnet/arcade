parameters:
# Azure DevOps job identifier.
- name: jobName
  type: string
  default: HelixJobMonitor

# Azure DevOps job display name.
- name: displayName
  type: string
  default: Helix Job Monitor

# Pool override. When empty the template selects a default azurelinux pool based on the team project.
- name: pool
  type: object
  default: {}

# Version of the .NET SDK installed on the agent before running the tool.
- name: dotnetVersion
  type: string
  default: 11.0.x

# Whether the UseDotNet@2 task is allowed to install preview SDKs.
- name: includePreviewVersions
  type: boolean
  default: true

# NuGet package id of the Helix job monitor tool.
- name: toolPackageId
  type: string
  default: Microsoft.DotNet.Helix.JobMonitor

# Console command exposed by the installed tool package.
- name: toolCommand
  type: string
  default: dotnet-helix-job-monitor

# Optional explicit tool version. When empty, the latest available version is installed.
- name: toolVersion
  type: string
  default: ''

# Optional NuGet feed used as an additional source when installing the tool.
- name: toolSource
  type: string
  default: ''

# Base URI for the Helix service (--helix-base-uri).
- name: helixBaseUri
  type: string
  default: https://helix.dot.net/

# Helix API access token forwarded to the tool via the HELIX_ACCESSTOKEN environment variable.
- name: helixAccessToken
  type: string
  default: ''

# Polling interval in seconds (--polling-interval-seconds).
- name: pollingIntervalSeconds
  type: number
  default: 30

# Maximum run time of the monitor job in minutes. Also used for --max-wait-minutes.
- name: timeoutInMinutes
  type: number
  default: 360

# Per-step timeout in minutes for the install / run steps.
- name: stepTimeoutInMinutes
  type: number
  default: 360

# Display name reported by the tool to Azure DevOps (--job-monitor-name).
- name: jobMonitorName
  type: string
  default: Helix Job Monitor

# Owner segment of the source repository (e.g. 'dotnet' for 'dotnet/runtime') passed via --organization.
# Defaults to the owner segment of BUILD_REPOSITORY_NAME when empty.
- name: organization
  type: string
  default: ''

# Name of the source repository (e.g. 'runtime' for 'dotnet/runtime') passed via --repository.
# Defaults to the repo segment of BUILD_REPOSITORY_NAME when empty.
- name: repository
  type: string
  default: ''

# Pull request number being built (--pr-number). Defaults to SYSTEM_PULLREQUEST_PULLREQUESTNUMBER
# when empty.
- name: prNumber
  type: string
  default: ''

# Optional working directory used to stage downloaded Helix test results (--working-directory).
- name: workingDirectory
  type: string
  default: ''

# Optional Azure DevOps job attempt number (--attempt). Defaults to SYSTEM_JOBATTEMPT.
- name: attempt
  type: string
  default: ''

# Optional dependency list for the generated job.
- name: dependsOn
  type: object
  default: []

# Optional condition for the generated job.
- name: condition
  type: string
  default: ''

# Advanced: optional pipeline artifact (produced earlier in this run) that contains the tool
# nupkg. When set, the artifact is downloaded and the directory containing the nupkg is added
# as a NuGet source for the 'dotnet tool install' command. Primarily intended for the Arcade
# repository itself, where the Helix job monitor tool is built in the same pipeline that runs
# this template; other repos should leave this empty and consume the published feed instead.
- name: toolNupkgArtifactName
  type: string
  default: ''

# Advanced: sub-path within the downloaded artifact where the tool nupkg is located. Defaults
# to the standard Arcade non-shipping packages location for a Release build (relative to the
# pipeline artifact root, which is itself the build's 'artifacts' directory).
- name: toolNupkgArtifactSubPath
  type: string
  default: 'packages/Release/NonShipping'

jobs:
- job: ${{ parameters.jobName }}
  displayName: ${{ parameters.displayName }}
  timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
  ${{ if ne(length(parameters.dependsOn), 0) }}:
    dependsOn: ${{ parameters.dependsOn }}
  ${{ if ne(parameters.condition, '') }}:
    condition: ${{ parameters.condition }}
  pool:
    ${{ if eq(variables['System.TeamProject'], 'public') }}:
      name: $(DncEngPublicBuildPool)
      image: build.azurelinux.3.amd64.open
    ${{ if eq(variables['System.TeamProject'], 'internal') }}:
      name: $(DncEngInternalBuildPool)
      image: build.azurelinux.3.amd64.open
  steps:
  - checkout: none

  - task: UseDotNet@2
    displayName: Install .NET SDK
    timeoutInMinutes: ${{ parameters.stepTimeoutInMinutes }}
    inputs:
      packageType: sdk
      version: ${{ parameters.dotnetVersion }}
      includePreviewVersions: ${{ parameters.includePreviewVersions }}

  - ${{ if ne(parameters.toolNupkgArtifactName, '') }}:
    - task: DownloadPipelineArtifact@2
      displayName: Download Helix job monitor nupkg artifact
      timeoutInMinutes: ${{ parameters.stepTimeoutInMinutes }}
      inputs:
        buildType: current
        artifactName: ${{ parameters.toolNupkgArtifactName }}
        itemPattern: '${{ parameters.toolNupkgArtifactSubPath }}/${{ parameters.toolPackageId }}.*.nupkg'
        targetPath: $(Agent.TempDirectory)/helix-job-monitor-nupkg

  - pwsh: |
      $toolPath = Join-Path $env:AGENT_TEMPDIRECTORY 'helix-job-monitor-tool'
      New-Item -ItemType Directory -Force -Path $toolPath | Out-Null

      Push-Location $env:AGENT_TEMPDIRECTORY
      try {
        $packageId = '${{ parameters.toolPackageId }}'
        $toolVersion = '${{ parameters.toolVersion }}'
        $toolSource = '${{ parameters.toolSource }}'

        $nupkgArtifactName = '${{ parameters.toolNupkgArtifactName }}'
        $nupkgArtifactSubPath = '${{ parameters.toolNupkgArtifactSubPath }}'
        if (-not [string]::IsNullOrWhiteSpace($nupkgArtifactName)) {
          $nupkgDir = Join-Path $env:AGENT_TEMPDIRECTORY (Join-Path 'helix-job-monitor-nupkg' $nupkgArtifactSubPath)
          if (-not (Test-Path $nupkgDir)) {
            throw "Expected nupkg directory '$nupkgDir' was not produced by the artifact download."
          }

          $nupkg = Get-ChildItem -Path $nupkgDir -Filter "$packageId.*.nupkg" -File | Select-Object -First 1
          if ($null -eq $nupkg) {
            throw "No '$packageId.*.nupkg' found in '$nupkgDir'."
          }

          # Derive the version from the nupkg filename so the local package is selected
          # deterministically instead of resolving against any other configured feed.
          $derivedVersion = $nupkg.BaseName.Substring($packageId.Length + 1)
          if ([string]::IsNullOrWhiteSpace($toolVersion)) {
            $toolVersion = $derivedVersion
          }

          Write-Host "Using locally built '$packageId' version '$toolVersion' from '$nupkgDir'."
          $toolSource = $nupkgDir
        }

        $updateArgs = @('tool', 'update', '--tool-path', $toolPath, $packageId)
        if (-not [string]::IsNullOrWhiteSpace($toolVersion)) {
          $updateArgs += @('--version', $toolVersion)
        }
        if (-not [string]::IsNullOrWhiteSpace($toolSource)) {
          $updateArgs += @('--add-source', $toolSource)
          $updateArgs += @('--ignore-failed-sources')
        }

        & dotnet @updateArgs
        if ($LASTEXITCODE -ne 0) {
          $installArgs = @('tool', 'install', '--tool-path', $toolPath, $packageId)
          if (-not [string]::IsNullOrWhiteSpace($toolVersion)) {
            $installArgs += @('--version', $toolVersion)
          }
          if (-not [string]::IsNullOrWhiteSpace($toolSource)) {
            $installArgs += @('--add-source', $toolSource)
            $installArgs += @('--ignore-failed-sources')
          }

          & dotnet @installArgs
        }

        if ($LASTEXITCODE -ne 0) {
          throw "Failed to install the Helix job monitor tool package '$packageId'."
        }

        Write-Host "##vso[task.prependpath]$toolPath"
        Write-Host "##vso[task.setvariable variable=HelixJobMonitorToolPath]$toolPath"
      }
      finally {
        Pop-Location
      }
    displayName: Install Helix job monitor
    timeoutInMinutes: ${{ parameters.stepTimeoutInMinutes }}

  - pwsh: |
      $toolArgs = @(
        '--helix-base-uri',           '${{ parameters.helixBaseUri }}',
        '--polling-interval-seconds', '${{ parameters.pollingIntervalSeconds }}',
        '--max-wait-minutes',         '${{ parameters.timeoutInMinutes }}',
        '--job-monitor-name',         '${{ parameters.jobMonitorName }}'
      )

      $organization     = '${{ parameters.organization }}'
      $repository       = '${{ parameters.repository }}'
      $prNumber         = '${{ parameters.prNumber }}'
      $workingDirectory = '${{ parameters.workingDirectory }}'
      $attempt          = '${{ parameters.attempt }}'

      # Fall back to Azure DevOps-provided environment variables when the caller did not
      # supply organization / repository / pr-number explicitly. BUILD_REPOSITORY_NAME is
      # typically 'owner/repo' for GitHub-backed builds.
      if ([string]::IsNullOrWhiteSpace($organization) -or [string]::IsNullOrWhiteSpace($repository)) {
        $buildRepoName = $env:BUILD_REPOSITORY_NAME
        if (-not [string]::IsNullOrWhiteSpace($buildRepoName) -and $buildRepoName.Contains('/')) {
          $repoParts = $buildRepoName.Split('/', 2)
          if ([string]::IsNullOrWhiteSpace($organization)) { $organization = $repoParts[0] }
          if ([string]::IsNullOrWhiteSpace($repository))   { $repository   = $repoParts[1] }
        }
      }

      if ([string]::IsNullOrWhiteSpace($prNumber)) {
        $prNumber = $env:SYSTEM_PULLREQUEST_PULLREQUESTNUMBER
      }

      if (-not [string]::IsNullOrWhiteSpace($organization))     { $toolArgs += @('--organization',      $organization) }
      if (-not [string]::IsNullOrWhiteSpace($repository))       { $toolArgs += @('--repository',        $repository) }
      if (-not [string]::IsNullOrWhiteSpace($prNumber))         { $toolArgs += @('--pr-number',         $prNumber) }
      if (-not [string]::IsNullOrWhiteSpace($workingDirectory)) { $toolArgs += @('--working-directory', $workingDirectory) }
      if (-not [string]::IsNullOrWhiteSpace($attempt))          { $toolArgs += @('--attempt',           $attempt) }

      & '${{ parameters.toolCommand }}' @toolArgs

      if ($LASTEXITCODE -ne 0) {
        throw "The Helix job monitor tool exited with code $LASTEXITCODE."
      }
    displayName: Run Helix job monitor
    timeoutInMinutes: ${{ parameters.stepTimeoutInMinutes }}
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
      HELIX_ACCESSTOKEN: ${{ parameters.helixAccessToken }}
