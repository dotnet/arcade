parameters:
# Stage identifier.
- name: stageName
  type: string
  default: Helix_Job_Monitor

# Optional list of stages this stage depends on.
- name: dependsOn
  type: object
  default: []

# Optional stage condition expression.
- name: condition
  type: string
  default: ''

# Job identifier produced inside the stage.
- name: jobName
  type: string
  default: HelixJobMonitor

# NuGet package id of the Helix job monitor tool.
- name: toolPackageId
  type: string
  default: Microsoft.DotNet.Helix.JobMonitor

# Console command exposed by the installed tool package.
- name: toolCommand
  type: string
  default: dotnet-helix-job-monitor

# Optional explicit tool version. When empty, the latest available version is installed.
- name: toolVersion
  type: string
  default: ''

# Optional NuGet feed used as an additional source when installing the tool.
- name: toolSource
  type: string
  default: ''

# JobMonitorOptions: --helix-base-uri.
- name: helixBaseUri
  type: string
  default: https://helix.dot.net/

# Helix API access token forwarded via the HELIX_ACCESSTOKEN environment variable.
- name: helixAccessToken
  type: string
  default: ''

# JobMonitorOptions: --polling-interval-seconds.
- name: pollingIntervalSeconds
  type: number
  default: 30

# JobMonitorOptions: --max-wait-minutes. Also used as the job/stage timeout.
- name: timeoutInMinutes
  type: number
  default: 360

# JobMonitorOptions: --job-monitor-name.
- name: jobMonitorName
  type: string
  default: Helix Job Monitor

# JobMonitorOptions: --organization (owner segment of the source repository).
- name: organization
  type: string
  default: ''

# JobMonitorOptions: --repository (name of the source repository).
- name: repository
  type: string
  default: ''

# JobMonitorOptions: --pr-number. Required for PR validation pipelines.
- name: prNumber
  type: string
  default: ''

# When true, the monitor tracks Helix jobs and pipeline jobs across every stage of the
# build. When false, the monitor only tracks jobs that belong to the same Azure DevOps stage as
# the monitor job itself (i.e. this stage).
- name: monitorAllStages
  type: boolean
  default: false

# Advanced: optional pipeline artifact (produced earlier in this run) that contains the tool
# nupkg. When set, the artifact is downloaded and the directory containing the nupkg is added
# as a NuGet source for the 'dotnet tool install' command. Primarily intended for the Arcade
# repository itself; other repos should leave this empty and consume the published feed instead.
- name: toolNupkgArtifactName
  type: string
  default: ''

# Advanced: sub-path within the downloaded artifact where the tool nupkg is located.
- name: toolNupkgArtifactSubPath
  type: string
  default: 'packages/Release/NonShipping'

stages:
- stage: ${{ parameters.stageName }}
  dependsOn: ${{ parameters.dependsOn }}
  ${{ if ne(parameters.condition, '') }}:
    condition: ${{ parameters.condition }}
  jobs:
  - template: /eng/common/core-templates/job/helix-job-monitor.yml
    parameters:
      jobName: ${{ parameters.jobName }}
      toolPackageId: ${{ parameters.toolPackageId }}
      toolCommand: ${{ parameters.toolCommand }}
      toolVersion: ${{ parameters.toolVersion }}
      toolSource: ${{ parameters.toolSource }}
      toolNupkgArtifactName: ${{ parameters.toolNupkgArtifactName }}
      toolNupkgArtifactSubPath: ${{ parameters.toolNupkgArtifactSubPath }}
      helixBaseUri: ${{ parameters.helixBaseUri }}
      helixAccessToken: ${{ parameters.helixAccessToken }}
      pollingIntervalSeconds: ${{ parameters.pollingIntervalSeconds }}
      timeoutInMinutes: ${{ parameters.timeoutInMinutes }}
      jobMonitorName: ${{ parameters.jobMonitorName }}
      organization: ${{ parameters.organization }}
      repository: ${{ parameters.repository }}
      prNumber: ${{ parameters.prNumber }}
      monitorAllStages: ${{ parameters.monitorAllStages }}
