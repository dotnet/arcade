parameters:
- name: oneLocEnabled
  default: false
  type: boolean
- name: microbuildUseESRP
  default: false
  type: boolean
# When true (default), run the in-build Arcade SDK validation stage (self-bootstrap with the newly
# produced SDK + RepoTests). Set to false as a bootstrap-breakage escape hatch to ship a new Arcade
# when the current one cannot self-validate; publishing then no longer depends on ValidateSdk.
- name: runValidateSdk
  default: true
  type: boolean

stages:
- stage: build
  displayName: Build
  jobs:
  - ${{ if eq(parameters.oneLocEnabled, true) }}:
    - template: /eng/common/templates-official/job/onelocbuild.yml@self
      parameters:
        MirrorRepo: arcade
        LclSource: lclFilesFromPackage
        LclPackageId: 'LCL-JUNO-PROD-ARCADE'
  - template: /eng/common/templates-official/jobs/jobs.yml@self
    parameters:
      artifacts:
        publish:
          artifacts: true
          logs: true
      enableMicrobuild: false
      microbuildUseESRP: ${{ parameters.microbuildUseESRP }}
      enablePublishBuildAssets: true
      enableSourceBuild: true
      publishingVersion: 4
      workspace:
        clean: all
      jobs:
      - job: Windows_NT
        enablePublishing: true
        timeoutInMinutes: 90
        strategy:
          matrix:
            Build_Release:
              _BuildConfig: Release
        preSteps:
        - checkout: self
          fetchDepth: 0
          clean: true
        steps:
        - script: eng\common\cibuild.cmd
            -configuration $(_BuildConfig)
            -prepareMachine
            $(_InternalBuildArgs)
            /p:Test=false
          displayName: Windows Build / Publish

- ${{ if eq(parameters.runValidateSdk, true) }}:
  - stage: ValidateSdk
    displayName: Validate Arcade SDK
    dependsOn: build
    jobs:
    - template: /eng/validate-sdk.yml@self
      parameters:
        microbuildUseESRP: ${{ parameters.microbuildUseESRP }}
        # Self-bootstrap with the newly produced SDK, then run the non-Helix validation RepoTests
        # against it (RunNonHelixTestsOnly skips the Helix-routed unit tests' inline execution).
        buildArgs: -configuration $(_BuildConfig)
          -prepareMachine
          $(_InternalBuildArgs)
          /p:RunNonHelixTestsOnly=true

- template: /eng/common/templates-official/post-build/post-build.yml@self
  parameters:
    publishingInfraVersion: 4
    # signing validation will not run, even if the below value is 'true', if the 'PostBuildSign' variable is set to 'true'
    enableSigningValidation: false
    publishDependsOn:
    - Validate
    - ${{ if eq(parameters.runValidateSdk, true) }}:
      - ValidateSdk
